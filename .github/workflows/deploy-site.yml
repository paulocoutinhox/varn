name: Deploy site

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

jobs:
  deploy:
    name: deploy
    # a manual run only publishes when launched from main
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.17
          actions-cache-folder: emsdk-cache

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CPM_SOURCE_CACHE }}
            build/wasm/_deps
          key: cpm-wasm-${{ hashFiles('cmake/dependencies.cmake', 'CMakeLists.txt', 'modules/ffi/libffi/varn-vendor-libffi.cmake', 'modules/ffi/libffi/fficonfig.h.in') }}
          restore-keys: cpm-wasm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Load the website deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WEBSITE_DEPLOY_KEY }}

      - name: Configure the commit identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and publish the site
        run: python3 varn.py site-deploy --remote git@github.com:varn-project/website.git
